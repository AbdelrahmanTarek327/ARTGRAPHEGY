[build]
  command = "rm -rf node_modules && npm install && npm run build:netlify"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# ── API proxy: same URLs the frontend already uses ──

[[redirects]]
  from   = "/api/inquiries"
  to     = "/.netlify/functions/inquiries"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/admin/inquiries/export"
  to     = "/.netlify/functions/admin-export"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/admin/inquiries/stats"
  to     = "/.netlify/functions/admin-stats"
  status = 200
  force  = true

# Health-check (lightweight, no function needed)
[[redirects]]
  from   = "/api/health"
  to     = "/.netlify/functions/health"
  status = 200
  force  = true

# ── SPA fallback (must be LAST) ──

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
